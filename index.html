<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="profile card" content="Professional Profile Card">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/assest/image/favicon.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Profile</title>
</head>
<body>
    <div class="container">
        <article data-testid="test-profile-card" class="profile-card">
            <div class="profile-image">
                <figure class="profile-avatar">
                    <img  data-testid="test-user-avatar" src="assest/image/profile-image.png" alt="Profile picture of Suara Isiaka">
                    <figcaption>
                        <h2 data-testid="test-user-name">Suara Isiaka</h2>
                        <strong>FontEnd Developer</strong>
                    </figcaption>
                </figure>
                <div class="bio-text">
                    <p data-testid="test-user-bio">Frontend developer passionate about<br> clean, responsive design.</p>
                    <div class="Skills">
                        <span>HTML</span>
                        <span>CSS</span>
                        <span>JavaScript</span>
                    </div>
                </div>
                <div class="button">
                    <ul class="interact-btn">
                        <li>
                            <a href="#" class="message-btn">
                                <i class="fa-solid fa-message"></i>Message
                            </a>
                        </li>
                        <li>
                            <a href="#" class="connect-btn">
                                <i class="fa-solid fa-plus"></i>Connect
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
            <section >
               <div class="Habbit">
                    <div class="hubbies">
                        <h4>Hubbies</h4>
                        <ul>
                            <li>🎮Gaming</li>
                            <li>📚Reading</li>
                            <li>🧑‍💻Coding</li>
                        </ul>
                    </div>
                    <div class="dislikes">
                        <h4>Dislikes</h4>
                        <ul>
                            <li>👾Bugs</li>
                            <li>🕛Slow Website</li>
                            <li>🚌Travling</li>
                        </ul>
                    </div>
               </div>
                <div class="socialLink">
                    <ul>
                        <li><a href="#"><i class="fa-brands fa-facebook"></i></a></li>
                        <li><a href="#"><i class="fa-brands fa-twitter"></i></a></li>
                        <li><a href="#"><i class="fa-brands fa-github"></i></a></li>
                        <li><a href="#"><i class="fa-solid fa-envelope"></i></a></li>
                        <li><a href="#"><i class="fa-brands fa-linkedin"></i></a></li>
                    </ul>
                </div>
            </section> 
            <p data-testid="test-user-time" id="current-time" class="time">Loading</p>
        </article>
    </div>
    <script src="script.js"></script>
</body>
</html>
